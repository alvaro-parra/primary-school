<!-- Diagnóstico: si algo falla antes de montar React, queda rastro visible. -->
<div id="boot-log" style="position: fixed; left: 0; right: 0; bottom: 0; max-height: 50vh; overflow: auto; background: rgba(20,20,24,0.95); color: #f4f4f6; font: 12px/1.4 ui-monospace, Menlo, Consolas, monospace; padding: 8px 12px; z-index: 99999; border-top: 2px solid #fda4af; display: none;"></div>
<script>
(function () {
  var box = document.getElementById("boot-log");
  function show() { if (box) box.style.display = "block"; }
  function add(kind, msg) {
    show();
    var line = document.createElement("div");
    line.style.color = kind === "error" ? "#fca5a5" : "#fcd34d";
    line.style.padding = "2px 0";
    line.textContent = "[" + kind + "] " + msg;
    box.appendChild(line);
  }
  window.addEventListener("error", function (e) {
    var src = e.filename ? e.filename.split("/").pop() : "";
    add("error", (e.message || "Error") + (src ? " — " + src + ":" + (e.lineno || "?") : ""));
  });
  window.addEventListener("unhandledrejection", function (e) {
    add("error", "Promise rechazada: " + (e.reason && e.reason.message ? e.reason.message : e.reason));
  });
  setTimeout(function () {
    var app = document.getElementById("app");
    if (app && app.firstChild && box) box.style.display = "none";
  }, 8000);
})();
</script>
